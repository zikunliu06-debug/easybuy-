<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyBuy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">EasyBuy</div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search for products..." />
      <button id="search-btn">Search</button>
    </div>
  </header>

  <!-- Banner -->
  <section class="banner">
    <div class="banner-text">
      <h1>Welcome to EasyBuy</h1>
      <p>Your simple shopping website</p>
    </div>
  </section>

  <!-- Categories -->
  <section class="categories">
    <button class="category-btn" data-category="All">All</button>
    <button class="category-btn" data-category="Fashion">Fashion</button>
    <button class="category-btn" data-category="Electronics">Electronics</button>
    <button class="category-btn" data-category="Home">Home</button>
    <button class="category-btn" data-category="Beauty">Beauty</button>
  </section>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Product List -->
    <section class="products">
      <h2>Products</h2>
      <div class="product-list" id="product-list"></div>
    </section>

    <!-- Cart -->
    <aside class="cart">
      <h2>Shopping Cart</h2>
      <div id="cart-items">
        <p class="empty-cart">No items yet.</p>
      </div>
      <h3 id="cart-total">Total: $0.00</h3>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
